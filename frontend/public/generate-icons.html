<!DOCTYPE html>
<html>
<head>
  <title>Generate App Icons</title>
</head>
<body>
  <div id="container">
    <img id="svg" src="logo2.svg" style="display: none;">
    <canvas id="canvas192" width="192" height="192"></canvas>
    <canvas id="canvas512" width="512" height="512"></canvas>
  </div>

  <script>
    window.onload = function() {
      const svgImg = document.getElementById('svg');
      
      svgImg.onload = function() {
        // Generate 192x192 icon
        const canvas192 = document.getElementById('canvas192');
        const ctx192 = canvas192.getContext('2d');
        ctx192.fillStyle = '#f5ba13';
        ctx192.fillRect(0, 0, 192, 192);
        ctx192.drawImage(svgImg, 20, 20, 152, 152);
        
        // Generate 512x512 icon
        const canvas512 = document.getElementById('canvas512');
        const ctx512 = canvas512.getContext('2d');
        ctx512.fillStyle = '#f5ba13';
        ctx512.fillRect(0, 0, 512, 512);
        ctx512.drawImage(svgImg, 56, 56, 400, 400);
        
        // Download the images
        downloadCanvas(canvas192, 'logo192.png');
        downloadCanvas(canvas512, 'logo512.png');
      };
    };
    
    function downloadCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
